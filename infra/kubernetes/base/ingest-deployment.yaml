apiVersion: apps/v1
kind: Deployment
metadata:
  name: kqd-ingest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kqd-ingest
  template:
    metadata:
      labels:
        app: kqd-ingest
    spec:
      containers:
        - name: ingest
          image: kalshi-quant-dashboard-ingest:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3002
              name: http
          envFrom:
            - configMapRef:
                name: kqd-runtime
            - secretRef:
                name: kqd-secrets
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
